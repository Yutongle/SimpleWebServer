<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件上传 — SimpleWebServer</title>
    <style>
        :root {
            --sidebar-width: 240px;
            --primary: #667eea;
            --accent: #f39c12;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255,255,255,0.08);
            --card-border: rgba(255,255,255,0.12);
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0b8;
            --sidebar-bg: rgba(20, 20, 50, 0.85);
            --hover-bg: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ====== 侧边栏 ====== */
        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s;
        }
        .sidebar-logo {
            padding: 28px 24px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .sidebar-logo .icon { font-size: 28px; margin-bottom: 4px; }
        .sidebar-logo .name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
        .sidebar-logo .version { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        .sidebar-nav {
            flex: 1;
            padding: 12px 12px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-nav a {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 16px; border-radius: 10px;
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500;
            transition: all 0.2s; position: relative;
        }
        .sidebar-nav a:hover { background: var(--hover-bg); color: #fff; }
        .sidebar-nav a.active {
            background: rgba(102, 126, 234, 0.25); color: #fff;
            box-shadow: 0 0 0 1px rgba(102, 126, 234, 0.3);
        }
        .sidebar-nav a.active::before {
            content: ""; position: absolute; left: 0;
            top: 10px; bottom: 10px; width: 4px;
            border-radius: 0 4px 4px 0; background: var(--primary);
        }
        .sidebar-nav .nav-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }

        .sidebar-footer {
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 12px; color: var(--text-secondary); line-height: 1.6;
        }
        .sidebar-footer .dot {
            display: inline-block; width: 7px; height: 7px;
            border-radius: 50%; background: #27ae60; margin-right: 6px;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.5); }
            50%      { box-shadow: 0 0 0 8px rgba(39, 174, 96, 0); }
        }

        /* ====== 主内容区 ====== */
        .main {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 48px 56px 40px;
            min-height: 100vh;
        }

        .hero { margin-bottom: 32px; }
        .hero h1 { font-size: 30px; font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
        .hero .subtitle { font-size: 14px; color: var(--text-secondary); }

        /* ====== 上传区域 ====== */
        .upload-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 32px;
            max-width: 720px;
        }

        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 14px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.25s;
            cursor: pointer;
            background: rgba(0,0,0,0.1);
        }
        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(102, 126, 234, 0.1);
        }
        .drop-zone .dz-icon {
            font-size: 48px;
            margin-bottom: 14px;
        }
        .drop-zone .dz-text {
            font-size: 16px;
            color: #ccc;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .drop-zone .dz-hint {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .drop-zone input[type="file"] {
            display: none;
        }

        /* 已选文件信息 */
        .file-info {
            display: none;
            margin-top: 18px;
            padding: 14px 18px;
            background: rgba(102, 126, 234, 0.15);
            border-radius: 10px;
            align-items: center;
            gap: 12px;
        }
        .file-info.show { display: flex; }
        .file-info .fi-icon { font-size: 24px; flex-shrink: 0; }
        .file-info .fi-details { flex: 1; min-width: 0; }
        .file-info .fi-name {
            font-size: 14px; font-weight: 600; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .file-info .fi-size { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .file-info .fi-remove {
            background: none; border: 1px solid rgba(255,255,255,0.15);
            color: #e74c3c; width: 30px; height: 30px; border-radius: 50%;
            cursor: pointer; font-size: 16px; transition: all 0.2s;
            flex-shrink: 0;
        }
        .file-info .fi-remove:hover {
            background: rgba(231, 76, 60, 0.2);
            border-color: rgba(231, 76, 60, 0.4);
        }

        .upload-btn {
            margin-top: 18px;
            width: 100%;
            padding: 13px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .upload-btn:hover { background: #5a6fd6; }
        .upload-btn:disabled {
            background: rgba(255,255,255,0.08);
            color: #666;
            cursor: not-allowed;
        }

        /* 结果消息 */
        .result-msg {
            display: none;
            margin-top: 16px;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            align-items: center;
            gap: 10px;
        }
        .result-msg.show { display: flex; }
        .result-msg.success {
            background: rgba(39, 174, 96, 0.15);
            color: #6fcf97;
            border: 1px solid rgba(39, 174, 96, 0.25);
        }
        .result-msg.error {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.25);
        }
        .result-msg .rm-icon { font-size: 20px; flex-shrink: 0; }

        /* 进度条 */
        .progress-bar {
            display: none;
            margin-top: 16px;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar.show { display: block; }
        .progress-bar .fill {
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
            width: 0%;
            transition: width 0.3s;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 32px 20px; }
        }
    </style>
</head>
<body>

    <!-- ====== 侧边栏 ====== -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="icon">🚀</div>
            <div class="name">SimpleWebServer</div>
            <div class="version">v1.0 · HTTP/1.1</div>
        </div>
        <ul class="sidebar-nav">
            <li><a href="/">
                <span class="nav-icon">🏠</span> 首页
            </a></li>
            <li><a href="/upload" class="active">
                <span class="nav-icon">📤</span> 文件上传
            </a></li>
            <li><a href="/admin/">
                <span class="nav-icon">⚙️</span> 管理面板
            </a></li>
            <li><a href="/login">
                <span class="nav-icon">🔑</span> 用户登录
            </a></li>
        </ul>
        <div class="sidebar-footer">
            <span class="dot"></span> 服务器运行中
        </div>
    </aside>

    <!-- ====== 主内容区 ====== -->
    <main class="main">
        <div class="hero">
            <h1>📤 文件上传</h1>
            <div class="subtitle">上传文件到服务器 — 最大支持 10 MB</div>
        </div>

        <div class="upload-card">
            <!-- 拖拽上传区 -->
            <div class="drop-zone" id="dropZone">
                <div class="dz-icon">📂</div>
                <div class="dz-text">点击选择文件或拖拽到此处</div>
                <div class="dz-hint">支持任意文件类型</div>
                <input type="file" id="fileInput">
            </div>

            <!-- 已选文件信息 -->
            <div class="file-info" id="fileInfo">
                <span class="fi-icon">📄</span>
                <div class="fi-details">
                    <div class="fi-name" id="fileName"></div>
                    <div class="fi-size" id="fileSize"></div>
                </div>
                <button class="fi-remove" id="removeFile" title="移除文件">✕</button>
            </div>

            <!-- 上传按钮 -->
            <button class="upload-btn" id="uploadBtn" disabled>上传文件</button>

            <!-- 进度条 -->
            <div class="progress-bar" id="progressBar">
                <div class="fill" id="progressFill"></div>
            </div>

            <!-- 结果消息 -->
            <div class="result-msg" id="resultMsg">
                <span class="rm-icon" id="resultIcon"></span>
                <span id="resultText"></span>
            </div>
        </div>
    </main>

    <script>
        var dropZone = document.getElementById('dropZone');
        var fileInput = document.getElementById('fileInput');
        var fileInfo = document.getElementById('fileInfo');
        var fileName = document.getElementById('fileName');
        var fileSize = document.getElementById('fileSize');
        var removeFile = document.getElementById('removeFile');
        var uploadBtn = document.getElementById('uploadBtn');
        var progressBar = document.getElementById('progressBar');
        var progressFill = document.getElementById('progressFill');
        var resultMsg = document.getElementById('resultMsg');
        var resultIcon = document.getElementById('resultIcon');
        var resultText = document.getElementById('resultText');

        var selectedFile = null;

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function showFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);
            fileInfo.classList.add('show');
            uploadBtn.disabled = false;
            resultMsg.classList.remove('show');
            progressBar.classList.remove('show');
        }

        function clearFile() {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.classList.remove('show');
            uploadBtn.disabled = true;
        }

        // 点击触发文件选择
        dropZone.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                showFile(fileInput.files[0]);
            }
        });

        // 拖拽事件
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                showFile(e.dataTransfer.files[0]);
            }
        });

        // 移除文件
        removeFile.addEventListener('click', function(e) {
            e.stopPropagation();
            clearFile();
        });

        // 上传
        uploadBtn.addEventListener('click', function() {
            if (!selectedFile) return;

            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            resultMsg.classList.remove('show');
            progressBar.classList.add('show');
            progressFill.style.width = '30%';

            var formData = new FormData();
            formData.append('file', selectedFile);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload', true);

            xhr.upload.onprogress = function(e) {
                if (e.lengthComputable) {
                    var pct = 30 + (e.loaded / e.total) * 60;
                    progressFill.style.width = pct + '%';
                }
            };

            xhr.onload = function() {
                progressFill.style.width = '100%';
                progressBar.classList.remove('show');
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传文件';

                try {
                    var resp = JSON.parse(xhr.responseText);
                    if (resp.status === 'ok') {
                        resultIcon.textContent = '✅';
                        resultText.textContent = '上传成功: ' + resp.filename;
                        resultMsg.className = 'result-msg success show';
                        clearFile();
                    } else {
                        resultIcon.textContent = '❌';
                        resultText.textContent = '上传失败: ' + (resp.error || '未知错误');
                        resultMsg.className = 'result-msg error show';
                    }
                } catch (e) {
                    resultIcon.textContent = '❌';
                    resultText.textContent = '服务器响应异常';
                    resultMsg.className = 'result-msg error show';
                }
            };

            xhr.onerror = function() {
                progressBar.classList.remove('show');
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传文件';
                resultIcon.textContent = '❌';
                resultText.textContent = '网络错误，上传失败';
                resultMsg.className = 'result-msg error show';
            };

            xhr.send(formData);
        });
    </script>
</body>
</html>
