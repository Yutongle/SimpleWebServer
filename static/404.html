<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 未找到 — SimpleWebServer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 60px 80px;
            text-align: center;
            max-width: 550px;
            width: 90%;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #f39c12;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #fdebd0;
        }
        .error-text {
            font-size: 24px;
            color: #555;
            margin-bottom: 20px;
        }
        .error-description {
            font-size: 15px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .error-detail {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            text-align: left;
            line-height: 1.6;
        }
        .home-link {
            display: inline-block;
            background: #3498db;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            transition: background 0.2s;
        }
        .home-link:hover { background: #2980b9; }
        .server-footer {
            margin-top: 30px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-text">页面未找到</div>
        <div class="error-description">
            抱歉，您请求的页面 <strong id="requested-path">/nonexistent</strong> 不存在。
        </div>
        <div class="error-detail">
            <strong>💡 可能的原因：</strong><br>
            • URL 输入有误，请检查拼写<br>
            • 该页面已被移动或删除<br>
            • 链接已过期或失效
        </div>
        <a href="/" class="home-link">🏠 返回首页</a>
        <div class="server-footer">SimpleWebServer/1.0</div>
    </div>
    <script>
        document.getElementById('requested-path').textContent =
            window.location.pathname || '/';
    </script>
</body>
</html>
